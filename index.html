<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Premium | Mundo dos Mimos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --roxo: #6A0DAD;
            --roxo-escuro: #4B0082;
            --roxo-claro: #F3E5F5;
            --texto: #2D2D2D;
            --branco-puro: #ffffff;
        }

        /* FUNDO SOFISTICADO */
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background: linear-gradient(rgba(255,255,255,0.88), rgba(255,255,255,0.88)), url('5.png');
            background-size: cover; background-attachment: fixed; background-position: center;
            color: var(--texto); scroll-behavior: smooth;
        }

        /* NAVBAR PREMIUM */
        nav {
            padding: 25px; text-align: center; background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo-img { max-width: 170px; height: auto; transition: 0.3s; }

        header { 
            text-align: center; padding: 60px 20px;
            background: rgba(106, 13, 173, 0.03); margin-bottom: 20px;
        }
        header h1 { font-weight: 300; font-size: 2.5rem; letter-spacing: -1px; margin: 0; color: var(--roxo); }
        header p { color: #666; font-size: 1.1rem; margin-top: 10px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* GRID DE PRODUTOS */
        .catalog-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 30px; padding-bottom: 80px;
        }

        .product-card {
            background: var(--branco-puro); border-radius: 24px; padding: 25px;
            text-align: center; cursor: pointer; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 2px solid transparent; box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(106, 13, 173, 0.12);
        }

        /* BORDA NO ITEM SELECIONADO (Feedback da imagem ca6752) */
        .product-card.active-card {
            border-color: var(--roxo);
            box-shadow: 0 0 20px rgba(106, 13, 173, 0.2);
            transform: scale(1.02);
        }

        .product-card img { width: 100%; height: 230px; object-fit: contain; margin-bottom: 20px; }
        .product-card h4 { margin: 10px 0; font-weight: 600; font-size: 1.1rem; }
        .product-card .status { font-size: 0.85rem; color: var(--roxo); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        /* PAINEL DE EXPANSÃO */
        .details-expanded {
            grid-column: 1 / -1; 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 30px; padding: 50px;
            margin: 15px 0 40px 0;
            display: grid; grid-template-columns: 1fr 1.2fr; gap: 60px;
            border: 2px solid var(--roxo);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @media (max-width: 850px) { 
            .details-expanded { grid-template-columns: 1fr; padding: 30px; gap: 30px; } 
        }

        .view-image { 
            background: #f9f9f9; border-radius: 20px; padding: 20px;
            display: flex; align-items: center; justify-content: center;
        }
        .view-image img { max-width: 100%; max-height: 450px; object-fit: contain; border-radius: 10px; }

        /* OPÇÕES ESTILIZADAS */
        .options-panel h2 { font-size: 2rem; margin-top: 0; font-weight: 600; }
        .label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: #999; display: block; margin-bottom: 15px; }
        
        .color-group { display: flex; gap: 15px; margin-bottom: 30px; }
        .color-dot {
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
            border: 2px solid #eee; transition: 0.3s; position: relative;
        }
        .color-dot.selected { 
            transform: scale(1.2); border-color: var(--roxo);
            box-shadow: 0 0 15px rgba(106, 13, 173, 0.3);
            outline: 3px solid var(--roxo); outline-offset: 3px;
        }

        .size-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 40px; }
        .size-btn {
            padding: 12px 25px; border: 1px solid #eee; background: white;
            border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .size-btn:hover { border-color: var(--roxo); }
        .size-btn.selected { background: var(--roxo); color: white; border-color: var(--roxo); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(106, 13, 173, 0.3); }

        .btn-whatsapp {
            background: #25D366; color: white; text-decoration: none; padding: 22px;
            border-radius: 18px; display: block; text-align: center; font-weight: 600;
            font-size: 1.1rem; transition: 0.4s; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
        }
        .btn-whatsapp:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(37, 211, 102, 0.3); }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(40px) scale(0.98); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
    </style>
</head>
<body>

<nav><img src="3.png" alt="Logo" class="logo-img"></nav>

<header>
    <h1>Exclusividade em cada detalhe</h1>
    <p>Selecione uma peça para personalizar sua experiência</p>
</header>

<div class="container">
    <div class="catalog-grid" id="main-grid"></div>
</div>

<script>
    const products = [
        { id: 1, nome: "Caneca Cerâmica", cores: ["Branco", "Roxo", "Preto"], sizes: ["325ml", "450ml"] },
        { id: 2, nome: "Camiseta Premium", cores: ["Preto", "Branco", "Roxo"], sizes: ["P", "M", "G", "GG"] },
        { id: 3, nome: "Garrafa Térmica", cores: ["Rosa", "Azul", "Preto"], sizes: ["600ml", "1L"] },
        { id: 4, nome: "Prato Decorativo", cores: ["Branco"], sizes: ["20cm", "25cm"] },
        { id: 5, nome: "Almofada Soft", cores: ["Branco", "Rosa"], sizes: ["40x40cm"] }
    ];

    let currentOpen = null;
    let selection = { color: "", size: "" };

    function render() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = products.map(p => `
            <div class="product-card" id="card-${p.id}" onclick="toggleDetails(${p.id})">
                <img src="${p.nome} ${p.id}.png" onerror="this.src='https://via.placeholder.com/250?text=${p.nome}'">
                <h4>${p.nome}</h4>
                <div class="status">Ver Detalhes</div>
            </div>
            <div id="box-${p.id}" style="display:contents;"></div>
        `).join('');
    }

    function toggleDetails(id) {
        const card = document.getElementById(`card-${id}`);

        if (currentOpen === id) {
            closeAll();
            currentOpen = null;
            return;
        }

        closeAll();
        currentOpen = id;
        
        // Adiciona a borda no card selecionado
        card.classList.add('active-card');
        
        const item = products.find(p => p.id === id);
        const container = document.getElementById(`box-${id}`);

        container.innerHTML = `
            <div class="details-expanded">
                <div class="view-image">
                    <img src="${item.nome} ${item.id}.png" onerror="this.src='https://via.placeholder.com/400?text=${item.nome}'">
                </div>
                <div class="options-panel">
                    <h2>${item.nome}</h2>
                    
                    <span class="label">Paleta de Cores</span>
                    <div class="color-group">
                        ${item.cores.map(c => `<div class="color-dot" style="background:${getHex(c)}" onclick="pickColor(this, '${c}', '${item.nome}', ${id})"></div>`).join('')}
                    </div>
                    
                    <span class="label">Tamanhos Disponíveis</span>
                    <div class="size-group">
                        ${item.sizes.map(s => `<button class="size-btn" onclick="pickSize(this, '${s}', '${item.nome}', ${id})">${s}</button>`).join('')}
                    </div>

                    <a href="#" id="wa-btn-${id}" class="btn-whatsapp" style="opacity:0.3; pointer-events:none;">
                        Solicitar Orçamento Exclusivo
                    </a>
                </div>
            </div>
        `;
        
        setTimeout(() => {
            window.scrollTo({ top: card.offsetTop - 100, behavior: 'smooth' });
        }, 100);
    }

    function closeAll() {
        // Remove a borda de todos os cards
        document.querySelectorAll('.product-card').forEach(c => c.classList.remove('active-card'));
        // Limpa as caixas de detalhes
        products.forEach(p => document.getElementById(`box-${p.id}`).innerHTML = '');
    }

    function getHex(cor) {
        const colors = { "Branco": "#ffffff", "Roxo": "#6A0DAD", "Preto": "#1a1a1a", "Rosa": "#FFB6C1", "Azul": "#4682B4" };
        return colors[cor] || "#ddd";
    }

    function pickColor(el, color, name, id) {
        el.parentElement.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
        el.classList.add('selected');
        selection.color = color;
        updateLink(name, id);
    }

    function pickSize(el, size, name, id) {
        el.parentElement.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        selection.size = size;
        updateLink(name, id);
    }

    function updateLink(name, id) {
        const btn = document.getElementById(`wa-btn-${id}`);
        if(selection.color && selection.size) {
            btn.style.opacity = "1";
            btn.style.pointerEvents = "all";
            const phone = "5511999999999"; 
            const msg = `Olá Mundo dos Mimos! Gostaria de um orçamento personalizado:\n\n*Item:* ${name}\n*Cor:* ${selection.color}\n*Tamanho:* ${selection.size}`;
            btn.href = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
        }
    }

    render();
</script>

</body>
</html>
