<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo dos Mimos | Catálogo Profissional</title>
    <style>
        :root {
            --roxo: #6A0DAD;
            --roxo-escuro: #4B0082;
            --texto: #333;
        }

        /* FUNDO 5.png MAIS OPACO PARA MELHOR LEITURA */
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url('5.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--texto);
            min-height: 100vh;
        }

        /* NAVBAR COM LOGO 3.png */
        nav {
            padding: 20px;
            text-align: center;
            background: #fff;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo-img { max-width: 180px; height: auto; }

        header { 
            text-align: center; padding: 40px 20px;
            background: rgba(106, 13, 173, 0.9); color: white;
            margin-bottom: 30px;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* GRELHA DE PRODUTOS */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            padding-bottom: 50px;
        }

        .product-card {
            background: #ffffff;
            border-radius: 18px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #eee;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .product-card:hover { transform: translateY(-5px); border-color: var(--roxo); }
        .product-card img { width: 100%; height: 200px; object-fit: contain; margin-bottom: 15px; }

        /* ABA DE DETALHES (EMBAIXO DO ITEM) */
        .details-expanded {
            grid-column: 1 / -1; /* Ocupa a largura total da linha */
            background: #ffffff;
            border-radius: 20px;
            padding: 35px;
            margin: 10px 0 30px 0;
            display: grid;
            grid-template-columns: 1fr 1fr; /* Imagem de um lado, opções do outro */
            gap: 40px;
            border: 2px solid var(--roxo);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            animation: slideDown 0.4s ease-out;
        }

        .view-image-container img {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 15px;
            background: #f9f9f9;
        }

        @media (max-width: 768px) { 
            .details-expanded { grid-template-columns: 1fr; padding: 20px; } 
        }

        /* OPÇÕES DE SELEÇÃO */
        .color-dot { 
            width: 35px; height: 35px; border-radius: 50%; display: inline-block; 
            margin: 5px; cursor: pointer; border: 2px solid #ddd; transition: 0.3s;
        }
        .color-dot.selected { border-color: var(--roxo); transform: scale(1.15); outline: 2px solid var(--roxo); outline-offset: 2px; }
        
        .size-btn { 
            padding: 12px 20px; border: 1px solid #ddd; background: #fff; 
            border-radius: 10px; margin: 5px; cursor: pointer;
        }
        .size-btn.selected { background: var(--roxo); color: white; border-color: var(--roxo); }

        .btn-whatsapp {
            background: #25D366; color: white; text-decoration: none; padding: 18px;
            border-radius: 12px; display: block; text-align: center; font-weight: bold; 
            font-size: 1.1rem; transition: 0.3s; margin-top: 25px;
        }

        @keyframes slideDown { 
            from { opacity: 0; transform: translateY(-20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

<nav><img src="3.png" alt="Logo" class="logo-img"></nav>

<header>
    <h1>Catálogo Mundo dos Mimos</h1>
    <p>Clique no produto para ver opções e personalizar</p>
</header>

<div class="container">
    <div class="catalog-grid" id="main-grid">
        </div>
</div>

<script>
    const products = [
        { id: 1, nome: "Caneca Cerâmica", cores: ["Branco", "Roxo", "Preto"], sizes: ["325ml"] },
        { id: 2, nome: "Camiseta Premium", cores: ["Preto", "Branco", "Roxo"], sizes: ["P", "M", "G", "GG"] },
        { id: 3, nome: "Garrafa Térmica", cores: ["Rosa", "Azul", "Preto"], sizes: ["600ml", "1L"] },
        { id: 4, nome: "Prato Decorativo", cores: ["Branco"], sizes: ["20cm", "25cm"] },
        { id: 5, nome: "Almofada Soft", cores: ["Branco", "Rosa"], sizes: ["40x40cm"] }
    ];

    let userSelection = { color: "", size: "" };
    let currentOpenId = null;

    function renderCatalog() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = products.map(p => `
            <div class="product-card" id="card-${p.id}" onclick="toggleDetails(${p.id})">
                <img src="${p.nome} ${p.id}.png" onerror="this.src='https://via.placeholder.com/250?text=${p.nome}'">
                <h4>${p.nome}</h4>
                <div style="color:var(--roxo); font-weight:bold;">Consultar Preço</div>
            </div>
            <div id="details-anchor-${p.id}" style="display:contents;"></div>
        `).join('');
    }

    function toggleDetails(id) {
        if (currentOpenId === id) {
            closeAll();
            currentOpenId = null;
            return;
        }

        closeAll();
        currentOpenId = id;
        const item = products.find(p => p.id === id);
        const anchor = document.getElementById(`details-anchor-${id}`);

        anchor.innerHTML = `
            <div class="details-expanded">
                <div class="view-image-container">
                    <img src="${item.nome} ${item.id}.png" onerror="this.src='https://via.placeholder.com/400?text=${item.nome}'">
                </div>
                <div>
                    <h2 style="color:var(--roxo); margin-top:0;">Personalizar ${item.nome}</h2>
                    <p>Selecione as opções para o seu pedido:</p>
                    
                    <strong>Cor disponível:</strong><br>
                    <div style="margin: 15px 0;">
                        ${item.colors.map(c => `<div class="color-dot" style="background:${getHex(c)}" onclick="selectColor(this, '${c}', '${item.nome}', ${id})"></div>`).join('')}
                    </div>
                    
                    <strong>Tamanho:</strong><br>
                    <div style="margin-top:10px;">
                        ${item.sizes.map(s => `<button class="size-btn" onclick="selectSize(this, '${s}', '${item.nome}', ${id})">${s}</button>`).join('')}
                    </div>

                    <a href="#" id="wa-btn-${id}" class="btn-whatsapp" style="opacity:0.5; pointer-events:none;">
                        Pedir Orçamento via WhatsApp
                    </a>
                </div>
            </div>
        `;
        
        setTimeout(() => {
            document.getElementById(`card-${id}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
    }

    function closeAll() {
        products.forEach(p => {
            document.getElementById(`details-anchor-${p.id}`).innerHTML = '';
        });
    }

    function getHex(cor) {
        const colors = { "Branco": "#fff", "Roxo": "#6A0DAD", "Preto": "#1a1a1a", "Rosa": "#FFB6C1", "Azul": "#4682B4" };
        return colors[cor] || "#ddd";
    }

    function selectColor(el, color, name, id) {
        el.parentElement.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
        el.classList.add('selected');
        userSelection.color = color;
        updateLink(name, id);
    }

    function selectSize(el, size, name, id) {
        el.parentElement.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        userSelection.size = size;
        updateLink(name, id);
    }

    function updateLink(name, id) {
        const btn = document.getElementById(`wa-btn-${id}`);
        if(userSelection.color && userSelection.size) {
            btn.style.opacity = "1";
            btn.style.pointerEvents = "all";
            const phone = "5511999999999"; 
            const msg = `Olá! Tenho interesse em:\n*${name}*\nCor: ${userSelection.color}\nTamanho: ${userSelection.size}`;
            btn.href = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
        }
    }

    renderCatalog();
</script>

</body>
</html>
